<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 910 235" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78716c"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="908" height="233" fill="#fafaf9"/>

  <!-- 5-1 -->
  <rect x="20" y="45" width="150" height="80" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="42" cy="67" r="12" fill="#d97706"/>
  <text x="42" y="71.5" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="95" y="72" font-size="13.5" font-weight="700" fill="#292524" text-anchor="middle">Issue 作成</text>
  <text x="95" y="95" font-size="10.5" fill="#78716c" text-anchor="middle">gh issue create</text>
  <text x="95" y="111" font-size="10.5" fill="#78716c" text-anchor="middle">要件を Issue に書く</text>

  <line x1="170" y1="85" x2="198" y2="85" stroke="#78716c" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 5-2 -->
  <rect x="200" y="45" width="150" height="80" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="222" cy="67" r="12" fill="#d97706"/>
  <text x="222" y="71.5" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="275" y="72" font-size="13.5" font-weight="700" fill="#292524" text-anchor="middle">ブランチ作成</text>
  <text x="275" y="95" font-size="10.5" fill="#78716c" text-anchor="middle">clone → claude 起動</text>
  <text x="275" y="111" font-size="10.5" fill="#78716c" text-anchor="middle">fix/issue-1</text>

  <line x1="350" y1="85" x2="378" y2="85" stroke="#78716c" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 5-3 -->
  <rect x="380" y="45" width="150" height="80" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="402" cy="67" r="12" fill="#d97706"/>
  <text x="402" y="71.5" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="455" y="72" font-size="13.5" font-weight="700" fill="#292524" text-anchor="middle">fix を実装</text>
  <text x="455" y="95" font-size="10.5" fill="#78716c" text-anchor="middle">Issue を読ませて</text>
  <text x="455" y="111" font-size="10.5" fill="#78716c" text-anchor="middle">Plan Mode で修正</text>

  <line x1="530" y1="85" x2="558" y2="85" stroke="#78716c" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 5-4 -->
  <rect x="560" y="45" width="150" height="80" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="582" cy="67" r="12" fill="#d97706"/>
  <text x="582" y="71.5" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="635" y="72" font-size="13.5" font-weight="700" fill="#292524" text-anchor="middle">レビュー → PR</text>
  <text x="635" y="95" font-size="10.5" fill="#78716c" text-anchor="middle">/code-review</text>
  <text x="635" y="111" font-size="10.5" fill="#78716c" text-anchor="middle">gh pr create</text>

  <line x1="710" y1="85" x2="738" y2="85" stroke="#78716c" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 5-5 -->
  <rect x="740" y="45" width="150" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="762" cy="67" r="12" fill="#d97706"/>
  <text x="762" y="71.5" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="815" y="72" font-size="13.5" font-weight="700" fill="#292524" text-anchor="middle">相互レビュー</text>
  <text x="815" y="95" font-size="10.5" fill="#78716c" text-anchor="middle">claude --from-pr</text>
  <text x="815" y="111" font-size="10.5" fill="#78716c" text-anchor="middle">修正 → マージ</text>

  <!-- ループバック -->
  <path d="M 815 125 V 185 H 95 V 133" fill="none" stroke="#78716c" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar)"/>
  <text x="455" y="177" font-size="11.5" fill="#78716c" text-anchor="middle">マージで「Closes #1」→ Issue 自動クローズ — Issue 起点のフローが一周</text>

  <text x="20" y="26" font-size="14" font-weight="700" fill="#b45309">Issue 起点の開発フロー</text>
</svg>
