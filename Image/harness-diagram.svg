<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78716c"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="818" height="428" fill="#f5f3ee"/>

  <!-- ユーザ -->
  <rect x="18" y="182" width="104" height="68" rx="10" fill="#ffffff" stroke="#d97757" stroke-width="1.5"/>
  <text x="70" y="212" font-size="15" font-weight="700" fill="#292524" text-anchor="middle">ユーザ</text>
  <text x="70" y="232" font-size="10.5" fill="#78716c" text-anchor="middle">日本語で依頼</text>

  <!-- ユーザ ⇄ Claude Code -->
  <line x1="128" y1="216" x2="164" y2="216" stroke="#78716c" stroke-width="1.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="146" y="204" font-size="10" fill="#78716c" text-anchor="middle">指示・承認</text>

  <!-- Claude Code -->
  <rect x="170" y="28" width="440" height="374" rx="14" fill="#fbf3ec" stroke="#d97757" stroke-width="2"/>
  <text x="192" y="58" font-size="18" font-weight="700" fill="#a84e32">Claude Code</text>
  <text x="192" y="78" font-size="12" fill="#78716c">= モデル + ハーネス で1つのエージェント</text>

  <!-- モデル -->
  <rect x="240" y="92" width="300" height="76" rx="10" fill="#f0c9b4" stroke="#a84e32" stroke-width="2"/>
  <text x="390" y="122" font-size="15" font-weight="700" fill="#292524" text-anchor="middle">モデル（LLM）</text>
  <text x="390" y="144" font-size="11.5" fill="#78716c" text-anchor="middle">考える・判断する「頭脳」</text>

  <!-- モデル ⇄ ハーネス -->
  <line x1="390" y1="172" x2="390" y2="196" stroke="#78716c" stroke-width="1.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- ハーネス -->
  <rect x="190" y="200" width="400" height="182" rx="12" fill="#ffffff" stroke="#d97757" stroke-width="1.5"/>
  <text x="210" y="228" font-size="15" font-weight="700" fill="#292524">ハーネス</text>
  <text x="282" y="228" font-size="11.5" fill="#78716c">モデルを実用的に動かす周辺機構</text>

  <rect x="208" y="242" width="178" height="54" rx="9" fill="#f7e4d8" stroke="#d97757" stroke-width="1"/>
  <text x="297" y="264" font-size="13" font-weight="600" fill="#292524" text-anchor="middle">ツール実行</text>
  <text x="297" y="282" font-size="10.5" fill="#78716c" text-anchor="middle">ファイル編集・コマンド</text>

  <rect x="394" y="242" width="178" height="54" rx="9" fill="#f7e4d8" stroke="#d97757" stroke-width="1"/>
  <text x="483" y="264" font-size="13" font-weight="600" fill="#292524" text-anchor="middle">パーミッション管理</text>
  <text x="483" y="282" font-size="10.5" fill="#78716c" text-anchor="middle">承認・許可ルール</text>

  <rect x="208" y="308" width="178" height="54" rx="9" fill="#f7e4d8" stroke="#d97757" stroke-width="1"/>
  <text x="297" y="330" font-size="13" font-weight="600" fill="#292524" text-anchor="middle">コンテキスト管理</text>
  <text x="297" y="348" font-size="10.5" fill="#78716c" text-anchor="middle">コンパクション（要約圧縮）</text>

  <rect x="394" y="308" width="178" height="54" rx="9" fill="#f7e4d8" stroke="#d97757" stroke-width="1"/>
  <text x="483" y="330" font-size="13" font-weight="600" fill="#292524" text-anchor="middle">セッション管理</text>
  <text x="483" y="348" font-size="10.5" fill="#78716c" text-anchor="middle">履歴の保持・再開</text>

  <!-- Claude Code → 作業環境 -->
  <line x1="614" y1="216" x2="656" y2="216" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="636" y="204" font-size="10" fill="#78716c" text-anchor="middle">ツール実行</text>

  <!-- 作業環境 -->
  <rect x="662" y="164" width="140" height="112" rx="10" fill="#ffffff" stroke="#d97757" stroke-width="1.5"/>
  <text x="732" y="192" font-size="15" font-weight="700" fill="#292524" text-anchor="middle">作業環境</text>
  <text x="732" y="216" font-size="11.5" fill="#78716c" text-anchor="middle">ファイル</text>
  <text x="732" y="236" font-size="11.5" fill="#78716c" text-anchor="middle">コマンド</text>
  <text x="732" y="256" font-size="11.5" fill="#78716c" text-anchor="middle">Git</text>

  <text x="410" y="422" font-size="11.5" fill="#78716c" text-anchor="middle">同じモデルでも、ハーネスの出来でエージェントの性能は大きく変わる</text>
</svg>
