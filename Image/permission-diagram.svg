<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78716c"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="818" height="338" fill="#f5f3ee"/>

  <!-- Claude -->
  <rect x="20" y="130" width="160" height="80" rx="10" fill="#fbf3ec" stroke="#d97757" stroke-width="2"/>
  <text x="100" y="158" font-size="14" font-weight="700" fill="#a84e32" text-anchor="middle">Claude</text>
  <text x="100" y="178" font-size="10" fill="#78716c" text-anchor="middle">ファイル編集や</text>
  <text x="100" y="194" font-size="10" fill="#78716c" text-anchor="middle">コマンド実行をしたい</text>

  <line x1="180" y1="176" x2="244" y2="176" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="212" y="156" font-size="9.5" fill="#78716c" text-anchor="middle">ツール実行</text>
  <text x="212" y="168" font-size="9.5" fill="#78716c" text-anchor="middle">の要求</text>

  <!-- ユーザ -->
  <rect x="285" y="18" width="150" height="54" rx="10" fill="#ffffff" stroke="#d97757" stroke-width="1.5"/>
  <text x="360" y="50" font-size="13" font-weight="700" fill="#292524" text-anchor="middle">ユーザ</text>
  <line x1="360" y1="72" x2="360" y2="106" stroke="#78716c" stroke-width="1.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="372" y="93" font-size="9.5" fill="#78716c">内容を確認して選ぶ</text>

  <!-- 承認ダイアログ -->
  <rect x="250" y="110" width="220" height="120" rx="10" fill="#f0c9b4" stroke="#a84e32" stroke-width="2"/>
  <text x="360" y="136" font-size="13" font-weight="700" fill="#292524" text-anchor="middle">パーミッション確認</text>
  <text x="360" y="154" font-size="10" fill="#78716c" text-anchor="middle">承認ダイアログを表示</text>
  <text x="360" y="178" font-size="9.5" fill="#292524" text-anchor="middle">1. Yes（1回だけ許可）</text>
  <text x="360" y="195" font-size="9.5" fill="#292524" text-anchor="middle">2. Yes, don't ask again</text>
  <text x="360" y="212" font-size="9.5" fill="#292524" text-anchor="middle">3. No（やめる）</text>

  <!-- 分岐 -->
  <line x1="470" y1="150" x2="554" y2="105" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="505" y="116" font-size="10" font-weight="700" fill="#16a34a" text-anchor="middle">承認</text>

  <line x1="470" y1="190" x2="554" y2="245" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="505" y="234" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">拒否</text>

  <!-- 実行する -->
  <rect x="560" y="70" width="240" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="680" y="98" font-size="13" font-weight="700" fill="#16a34a" text-anchor="middle">✔ ツールを実行</text>
  <text x="680" y="120" font-size="9.5" fill="#78716c" text-anchor="middle">結果が Claude に返り、次の判断材料に</text>

  <!-- 実行しない -->
  <rect x="560" y="210" width="240" height="70" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="680" y="238" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">✕ 実行しない</text>
  <text x="680" y="260" font-size="9.5" fill="#78716c" text-anchor="middle">Claude は別のやり方を検討</text>

  <text x="410" y="322" font-size="11" fill="#78716c" text-anchor="middle">読み取り系ツールは確認なしで実行される。よく使う安全なコマンドは settings.json の permissions で事前に許可できる（4-2）</text>
</svg>
