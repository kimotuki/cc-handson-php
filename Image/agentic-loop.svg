<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78716c"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="818" height="418" fill="#f5f3ee"/>

  <!-- ユーザ -->
  <rect x="20" y="126" width="110" height="60" rx="10" fill="#ffffff" stroke="#d97757" stroke-width="1.5"/>
  <text x="75" y="152" font-size="15" font-weight="700" fill="#292524" text-anchor="middle">ユーザ</text>
  <text x="75" y="172" font-size="10.5" fill="#78716c" text-anchor="middle">依頼を入力</text>

  <line x1="130" y1="156" x2="184" y2="156" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 割り込み -->
  <polyline points="75,186 75,330 182,330" fill="none" stroke="#78716c" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="98" y="352" font-size="9.5" fill="#78716c" text-anchor="middle">途中で割り込み・</text>
  <text x="98" y="368" font-size="9.5" fill="#78716c" text-anchor="middle">方針修正もできる</text>

  <!-- Claude Code -->
  <rect x="190" y="40" width="430" height="340" rx="14" fill="#fbf3ec" stroke="#d97757" stroke-width="2"/>
  <text x="212" y="70" font-size="16" font-weight="700" fill="#a84e32">Claude Code</text>
  <text x="212" y="94" font-size="11.5" font-weight="700" fill="#292524">① プロンプトを受け取る</text>
  <text x="212" y="110" font-size="9.5" fill="#78716c">ユーザ入力 + システムプロンプト + ツール一覧 + 会話履歴</text>

  <!-- ② 評価 -->
  <rect x="250" y="126" width="310" height="60" rx="10" fill="#f0c9b4" stroke="#a84e32" stroke-width="2"/>
  <text x="405" y="150" font-size="13" font-weight="700" fill="#292524" text-anchor="middle">② 評価して応答する</text>
  <text x="405" y="168" font-size="10" fill="#78716c" text-anchor="middle">テキストで答えるか、ツールを使うか判断</text>

  <!-- ループ矢印 -->
  <line x1="300" y1="186" x2="300" y2="280" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="292" y="230" font-size="10" fill="#78716c" text-anchor="end">ツールを使う</text>

  <line x1="510" y1="280" x2="510" y2="186" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="518" y="224" font-size="10" fill="#78716c">実行結果を</text>
  <text x="518" y="238" font-size="10" fill="#78716c">Claude に返す</text>

  <text x="405" y="228" font-size="11" font-weight="700" fill="#a84e32" text-anchor="middle">④ 繰り返す</text>
  <text x="405" y="244" font-size="9.5" fill="#78716c" text-anchor="middle">1サイクル = 1ターン</text>

  <!-- ③ ツール実行 -->
  <rect x="250" y="280" width="310" height="60" rx="10" fill="#f7e4d8" stroke="#d97757" stroke-width="1"/>
  <text x="405" y="304" font-size="13" font-weight="600" fill="#292524" text-anchor="middle">③ ツールを実行する</text>
  <text x="405" y="322" font-size="10" fill="#78716c" text-anchor="middle">ファイル読込・編集・コマンド実行</text>

  <!-- ⑤ 結果 -->
  <line x1="560" y1="156" x2="644" y2="156" stroke="#78716c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="602" y="142" font-size="9.5" fill="#78716c" text-anchor="middle">答えが出たら</text>

  <rect x="650" y="112" width="150" height="110" rx="10" fill="#ffffff" stroke="#d97757" stroke-width="1.5"/>
  <text x="725" y="140" font-size="12.5" font-weight="700" fill="#292524" text-anchor="middle">⑤ 結果を返す</text>
  <text x="725" y="162" font-size="10" fill="#78716c" text-anchor="middle">最終回答テキスト</text>
  <text x="725" y="180" font-size="10" fill="#78716c" text-anchor="middle">トークン量・コスト</text>
  <text x="725" y="198" font-size="9.5" fill="#78716c" text-anchor="middle">/usage・/status で確認</text>

  <text x="410" y="408" font-size="11.5" fill="#78716c" text-anchor="middle">② と ③ を繰り返し、ツールを使わずに答えられる状態になったら ⑤ で結果を返す</text>
</svg>
